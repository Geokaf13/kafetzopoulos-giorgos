<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Καφετζόπουλος</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
 
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at 50% 20%, #1a2740 0%, #0b1220 60%, #060a14 100%);
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #e8edf7;
    text-align: center;
    padding: 24px;
  }
 
  h1 {
    font-size: clamp(2.2rem, 6vw, 4rem);
    letter-spacing: 2px;
    font-weight: 700;
    background: linear-gradient(90deg, #ffd76a, #ff9f5a);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 6px;
  }
 
  .subtitle {
    color: #8fa0c0;
    font-size: 0.95rem;
    margin-bottom: 40px;
    letter-spacing: 1px;
  }
 
  .counter-box {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 40px 50px;
    box-shadow: 0 0 60px rgba(255, 180, 90, 0.08), inset 0 0 40px rgba(255,255,255,0.02);
    backdrop-filter: blur(6px);
  }
 
  .age-label {
    font-size: 1rem;
    color: #7f93b8;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 12px;
  }
 
  .age-value {
    font-size: clamp(2.4rem, 8vw, 5.5rem);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: #ffffff;
    text-shadow: 0 0 30px rgba(255, 200, 120, 0.3);
    white-space: nowrap;
  }
 
  .age-value .decimals {
    color: #ffb15e;
    font-size: 0.6em;
  }
 
  .footer {
    margin-top: 30px;
    font-size: 0.8rem;
    color: #55648a;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
 
  <h1>ΚΑΦΕΤΖΟΠΟΥΛΟΣ</h1>
  <div class="subtitle">ΓΕΩΡΓΙΟΣ</div>
 
  <div class="counter-box">
    <div class="age-label">Ηλικία</div>
    <div class="age-value" id="ageDisplay">—</div>
  </div>
 
  <div class="footer">από 19.01.1978</div>
 
  <script>
    // Ημερομηνία γέννησης: 19 Ιανουαρίου 1978 (τοπική ώρα)
    const birthDate = new Date(1978, 0, 19, 0, 0, 0, 0);
    const msPerYear = 365.2425 * 24 * 60 * 60 * 1000; // μέση ημερολογιακή χρονιά
 
    function updateAge() {
      const now = new Date();
      const diffMs = now - birthDate;
      const ageYears = diffMs / msPerYear;
      document.getElementById('ageDisplay').innerHTML =
        ageYears.toFixed(9);
    }
 
    updateAge();
    setInterval(updateAge, 50); // ανανέωση κάθε 50ms για ομαλή κίνηση ψηφίων
  </script>
 
</body>
</html>
